<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Connect 4 - Scribble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-background: #fdfbf7; --color-foreground: #2d2d2d; --color-muted: #e5e0d8;
      --color-border: #2d2d2d; --color-secondary: #2d5da1; --color-sticky: #fff9c4;
      --color-shadow: #2d2d2d; --font-heading: 'Kalam', cursive; --font-body: 'Patrick Hand', cursive;
    }
    body.dark {
      --color-background: #121212; --color-foreground: #ffffff; --color-muted: #2a2a2a;
      --color-border: #333; --color-shadow: transparent;
      background-image: radial-gradient(rgba(255,255,255,0.15) 1px, transparent 1px);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; overflow:hidden; }
    body {
      font-family:var(--font-body); background:var(--color-background);
      background-image:radial-gradient(var(--color-muted) 1px, transparent 1px); background-size:24px 24px;
      color:var(--color-foreground); display:flex; flex-direction:column;
    }
    .header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:2px dashed var(--color-border); background:var(--color-background); }
    .header h1 { font-family:var(--font-heading); font-size:1.4rem; }
    .header-right { display:flex; align-items:center; gap:8px; }
    .window-btn { background:none; border:2px solid var(--color-border); cursor:pointer; padding:6px; border-radius:255px 15px 225px 15px/15px 225px 15px 255px; color:var(--color-foreground); display:flex; align-items:center; justify-content:center; width:32px; height:32px; }
    .window-btn:hover { background:var(--color-muted); box-shadow:2px 2px 0 0 var(--color-shadow); }
    .back-btn { background:none; border:2px solid var(--color-border); cursor:pointer; padding:4px 12px; border-radius:255px 15px 225px 15px/15px 225px 15px 255px; font-family:var(--font-body); font-size:0.9rem; color:var(--color-foreground); }
    .back-btn:hover { background:var(--color-muted); box-shadow:2px 2px 0 var(--color-shadow); }
    .screen { flex:1; display:none; flex-direction:column; align-items:center; justify-content:center; padding:16px; }
    .screen.active { display:flex; }
    .mode-select { display:flex; flex-direction:column; align-items:center; gap:24px; max-width:400px; width:100%; }
    .mode-select h2 { font-family:var(--font-heading); font-size:1.6rem; text-align:center; }
    .mode-select p { font-size:1rem; opacity:0.7; text-align:center; }
    .mode-cards { display:flex; gap:16px; width:100%; }
    .mode-card { flex:1; aspect-ratio:1/1; border:2px solid var(--color-border); border-radius:255px 15px 225px 15px/15px 225px 15px 255px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:transform .15s,box-shadow .15s; gap:12px; padding:20px; text-align:center; }
    .mode-card:hover { transform:scale(1.05); box-shadow:3px 3px 0 var(--color-shadow); }
    .mode-card-local { background:#c8e6c9; }
    .mode-card-online { background:#bbdefb; }
    .mode-card svg { width:48px; height:48px; }
    .mode-card span { font-family:var(--font-heading); font-weight:700; font-size:1.1rem; }
    .board-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; flex:1; justify-content:center; }
    .status-bar { font-family:var(--font-heading); font-size:1.1rem; text-align:center; min-height:2rem; display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:center; }
    .board { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; max-width:400px; width:100%; background:#1e88e5; padding:6px; border-radius:12px; border:2px solid var(--color-border); }
    .cell { aspect-ratio:1/1; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s; }
    .cell.p1 { background:#e53935; }
    .cell.p2 { background:#fdd835; }
    .cell.win { box-shadow:0 0 0 3px #4caf50; }
    .cell:hover:not(.p1):not(.p2) { background:#e3f2fd; }
    .board-controls { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    .primary-btn { background:var(--color-secondary); border:2px solid var(--color-border); color:#fff; cursor:pointer; padding:6px 18px; border-radius:255px 15px 225px 15px/15px 225px 15px 255px; font-family:var(--font-body); font-size:0.95rem; transition:transform .1s,box-shadow .1s; }
    .primary-btn:hover { transform:scale(1.05); box-shadow:3px 3px 0 var(--color-shadow); }
    .secondary-btn { background:var(--color-muted); border:2px solid var(--color-border); cursor:pointer; padding:6px 18px; border-radius:255px 15px 225px 15px/15px 225px 15px 255px; font-family:var(--font-body); font-size:0.95rem; color:var(--color-foreground); transition:transform .1s,box-shadow .1s; }
    .secondary-btn:hover { transform:scale(1.05); box-shadow:3px 3px 0 var(--color-shadow); }
    .online-lobby { display:none; flex-direction:column; align-items:center; gap:20px; max-width:380px; width:100%; }
    .online-lobby.active { display:flex; }
    .online-lobby h2 { font-family:var(--font-heading); font-size:1.4rem; }
    .lobby-actions { display:flex; flex-direction:column; gap:12px; width:100%; }
    .room-code-display { display:flex; align-items:center; gap:10px; background:var(--color-sticky); border:2px solid var(--color-border); border-radius:255px 15px 225px 15px/15px 225px 15px 255px; padding:12px 18px; font-family:var(--font-heading); font-size:1.6rem; letter-spacing:4px; justify-content:center; }
    .room-code-display button { background:none; border:none; cursor:pointer; color:var(--color-foreground); display:flex; padding:4px; }
    .lobby-input-row { display:flex; gap:8px; width:100%; }
    .lobby-input-row input { flex:1; font-family:var(--font-heading); font-size:1.2rem; letter-spacing:4px; text-align:center; text-transform:uppercase; padding:10px; border:2px solid var(--color-border); border-radius:255px 15px 225px 15px/15px 225px 15px 255px; background:var(--color-background); color:var(--color-foreground); outline:none; }
    .lobby-input-row input:focus { box-shadow:2px 2px 0 var(--color-shadow); }
    .status-msg { font-size:0.95rem; opacity:0.7; text-align:center; min-height:1.5rem; }
    .status-msg.error { color:#e53935; opacity:1; }
    .win-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; z-index:100; }
    .win-overlay.active { display:flex; }
    .win-card { background:var(--color-background); border:2px solid var(--color-border); border-radius:255px 15px 225px 15px/15px 225px 15px 255px; padding:28px 32px; text-align:center; max-width:340px; width:90%; box-shadow:6px 6px 0 var(--color-shadow); }
    .win-card h2 { font-family:var(--font-heading); font-size:1.6rem; margin-bottom:6px; }
    .win-card p { font-size:1rem; margin-bottom:4px; }
    .win-card .btn-row { display:flex; gap:10px; margin-top:16px; justify-content:center; flex-wrap:wrap; }
    .lb-wrap { margin-top:12px; padding-top:8px; border-top:1px dashed var(--color-border); max-height:160px; overflow-y:auto; text-align:left; }
    .lb-wrap h3 { font-family:var(--font-heading); font-size:0.85rem; text-align:center; margin-bottom:6px; }
    .lb-wrap ol { list-style:none; padding:0; font-size:0.8rem; }
    .lb-wrap li { display:flex; justify-content:space-between; padding:2px 4px; border-radius:4px; }
    .lb-wrap li.me { background:rgba(0,0,0,0.06); font-weight:700; }
    .lb-wrap .lb-empty { text-align:center; opacity:0.5; font-size:0.8rem; padding:8px 0; }
    @media (max-width:480px) { .mode-cards { flex-direction:column; } .board { max-width:320px; } }
  </style>
</head>
<body>
<div class="header">
  <h1>🔴 Connect 4</h1>
  <div class="header-right">
    <button class="back-btn" id="header-back-btn" style="display:none;" onclick="goHome()">← Back</button>
    <button class="window-btn" id="dark-toggle" onclick="document.body.classList.toggle('dark')">
      <svg viewBox="0 0 16 16" width="14" height="14"><path d="M 9 2 C 5.5 2 3 5 3 8.5 C 3 12 5.5 14.5 9 14.5 C 10.5 14.5 12 13.5 13 12 C 10 12.5 6.5 11 6.5 8 C 6.5 5.5 8 3.5 10.5 3 C 10 2.5 9.5 2 9 2 Z" fill="currentColor"/></svg>
    </button>
  </div>
</div>
<div class="screen active" id="screen-mode">
  <div class="mode-select">
    <h2>Connect 4</h2>
    <p>Get 4 in a row to win!</p>
    <div class="mode-cards">
      <div class="mode-card mode-card-local" onclick="startLocal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="8" cy="12" r="1.5"/><circle cx="16" cy="12" r="1.5"/></svg>
        <span>Local<br>Hot-Seat</span>
      </div>
      <div class="mode-card mode-card-online" onclick="initOnline()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M4 12h16"/><path d="M12 4v16"/><circle cx="8" cy="8" r="1"/><circle cx="16" cy="8" r="1"/><circle cx="8" cy="16" r="1"/><circle cx="16" cy="16" r="1"/></svg>
        <span>Online<br>Multiplayer</span>
      </div>
    </div>
  </div>
</div>
<div class="screen" id="screen-lobby">
  <div class="online-lobby active" id="lobby-root">
    <h2>Online Game</h2>
    <div style="display:flex;gap:10px;width:100%;">
      <button class="primary-btn" style="flex:1;" onclick="createOnlineGame()">Create Game</button>
      <button class="secondary-btn" style="flex:1;" onclick="showJoinInput()">Join Game</button>
    </div>
    <div id="join-row" class="lobby-input-row" style="display:none;">
      <input type="text" id="join-code-input" maxlength="6" placeholder="ENTER CODE" onkeyup="if(event.key==='Enter')joinOnlineGame()">
      <button class="primary-btn" onclick="joinOnlineGame()">Join</button>
    </div>
    <div id="room-created" style="display:none;flex-direction:column;align-items:center;gap:12px;width:100%;">
      <p style="font-size:0.9rem;opacity:0.7;">Share this code with a friend:</p>
      <div class="room-code-display"><span id="room-code-value"></span><button onclick="copyRoomCode()" title="Copy code"><svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="10" height="10" rx="1"/><path d="M6 6h8v8H6z"/></svg></button></div>
      <p class="status-msg" id="lobby-status">Waiting for opponent...</p>
    </div>
    <p class="status-msg" id="lobby-error"></p>
    <button class="secondary-btn" onclick="goHome()">Back</button>
  </div>
</div>
<div class="screen" id="screen-board">
  <div class="board-wrap">
    <div class="status-bar" id="status-bar"><span id="status-text">Player 1's turn</span></div>
    <div class="board" id="board"></div>
    <div class="board-controls">
      <button class="primary-btn" id="reset-btn" onclick="resetGame()">↻ Play Again</button>
      <button class="secondary-btn" onclick="goHome()">← Menu</button>
    </div>
  </div>
</div>
<div class="win-overlay" id="win-overlay">
  <div class="win-card">
    <h2 id="win-title">Game Over</h2>
    <p id="win-desc"></p>
    <div class="lb-wrap"><h3>🏆 Leaderboard</h3><div id="lb-content" class="lb-empty">Loading...</div></div>
    <div class="btn-row">
      <button class="primary-btn" onclick="closeWin()">Play Again</button>
      <button class="secondary-btn" onclick="goHome()">Menu</button>
    </div>
  </div>
</div>
<script>
var DB_SECRET='VkAJSSFjEpCFAeDr6Sy1pDoAoBmxgOInoUoLUGc9';var DB_BASE='https://telegram-a007d-default-rtdb.firebaseio.com';
var COLS=7,ROWS=6;
var board=[],turn=1,mode=null,gameOver=false,onlineRole=null,gameId=null,mySymbol=null,myId=null,hostName='',guestName='';
var _pollTimer=null,_lastSyncTime=0,_syncDelay=500,_knownMoveCount=0,_resetVersion=0;
function getPlayerId(){var id=localStorage.getItem('c4_player_id');if(id)return id;id='p_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);localStorage.setItem('c4_player_id',id);return id;}
myId=getPlayerId();
function getDisplayName(){return localStorage.getItem('ttt_display_name')||'';}
function fbPut(p,d){return fetch(DB_BASE+p+'.json?auth='+DB_SECRET,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(function(r){return r.json();});}
function fbPatch(p,d){return fetch(DB_BASE+p+'.json?auth='+DB_SECRET,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(function(r){return r.json();});}
function fbGet(p){return fetch(DB_BASE+p+'.json?auth='+DB_SECRET).then(function(r){return r.json();});}
function fbDelete(p){return fetch(DB_BASE+p+'.json?auth='+DB_SECRET,{method:'DELETE'});}
function initBoard(){board=[];for(var c=0;c<COLS;c++){board[c]=[];for(var r=0;r<ROWS;r++)board[c][r]=0;}}
function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');document.getElementById('header-back-btn').style.display=(id!=='screen-mode')?'inline-block':'none';}
function goHome(){cleanupOnline();mode=null;gameOver=false;onlineRole=null;gameId=null;mySymbol=null;document.getElementById('win-overlay').classList.remove('active');showScreen('screen-mode');}
function renderBoard(){var el=document.getElementById('board');el.innerHTML='';for(var r=0;r<ROWS;r++){for(var c=0;c<COLS;c++){var cell=document.createElement('div');cell.className='cell';if(board[c][r]===1)cell.classList.add('p1');else if(board[c][r]===2)cell.classList.add('p2');cell.dataset.col=c;cell.onclick=function(){drop(parseInt(this.dataset.col));};el.appendChild(cell);}}updateStatus();}
function updateStatus(){var el=document.getElementById('status-text');if(gameOver){var t=document.getElementById('win-title');if(t)el.textContent=t.textContent;return;}var names=mode==='online'?{1:hostName||'P1',2:guestName||'P2'}:{1:'Player 1',2:'Player 2'};if(mode==='local')el.textContent=names[turn]+"'s turn ("+(turn===1?'🔴':'🟡')+')';else{if(mySymbol===turn)el.textContent='Your turn ('+names[turn]+')';else el.textContent=names[turn]+"'s turn";}}
function getValidRow(col){for(var r=ROWS-1;r>=0;r--)if(board[col][r]===0)return r;return-1;}
function checkWin(){var p;for(var c=0;c<COLS;c++){for(var r=0;r<ROWS;r++){p=board[c][r];if(!p)continue;if(c+3<COLS&&p===board[c+1][r]&&p===board[c+2][r]&&p===board[c+3][r])return{p:p,win:[[c,r],[c+1,r],[c+2,r],[c+3,r]]};if(r+3<ROWS&&p===board[c][r+1]&&p===board[c][r+2]&&p===board[c][r+3])return{p:p,win:[[c,r],[c,r+1],[c,r+2],[c,r+3]]};if(c+3<COLS&&r+3<ROWS&&p===board[c+1][r+1]&&p===board[c+2][r+2]&&p===board[c+3][r+3])return{p:p,win:[[c,r],[c+1,r+1],[c+2,r+2],[c+3,r+3]]};if(c-3>=0&&r+3<ROWS&&p===board[c-1][r+1]&&p===board[c-2][r+2]&&p===board[c-3][r+3])return{p:p,win:[[c,r],[c-1,r+1],[c-2,r+2],[c-3,r+3]]};}}return null;}
function isBoardFull(){for(var c=0;c<COLS;c++)if(board[c][0]===0)return false;return true;}
function drop(col){if(gameOver)return;var row=getValidRow(col);if(row===-1)return;if(mode==='online'&&mySymbol!==turn)return;board[col][row]=turn;renderBoard();var result=checkWin();if(result){gameOver=true;highlightWin(result.win);document.getElementById('win-title').textContent='🎉 You win!';document.getElementById('win-desc').textContent='Connect 4!';document.getElementById('win-overlay').classList.add('active');submitLeaderboard('connect4',turn===1?100:50);loadLeaderboard('connect4',turn===1?100:50);}else if(isBoardFull()){gameOver=true;document.getElementById('win-title').textContent='🤝 Draw!';document.getElementById('win-desc').textContent='The board is full.';document.getElementById('win-overlay').classList.add('active');submitLeaderboard('connect4',10);loadLeaderboard('connect4',10);}else{turn=turn===1?2:1;updateStatus();}if(mode==='online'){_knownMoveCount++;fbPatch('/connect4/'+gameId,{board:board,turn:turn,moveCount:_knownMoveCount,gameOver:gameOver}).then(function(){_lastSyncTime=Date.now();});}}
function highlightWin(winCells){var cells=document.querySelectorAll('.cell');winCells.forEach(function(wc){var idx=wc[1]*COLS+wc[0];if(cells[idx])cells[idx].classList.add('win');});}
function resetGame(){initBoard();turn=1;gameOver=false;_knownMoveCount=0;document.getElementById('win-overlay').classList.remove('active');if(mode==='online'){_resetVersion++;_lastSyncTime=Date.now();fbPatch('/connect4/'+gameId,{board:board,turn:turn,moveCount:0,status:'playing',resetVersion:_resetVersion}).then(function(){_lastSyncTime=Date.now();renderBoard();});}else renderBoard();}
// Local mode
function startLocal(){mode='local';initBoard();turn=1;gameOver=false;_knownMoveCount=0;_resetVersion=0;showScreen('screen-board');renderBoard();}
// Online mode
function initOnline(){showScreen('screen-lobby');document.getElementById('lobby-root').style.display='flex';document.getElementById('room-created').style.display='none';document.getElementById('join-row').style.display='none';document.getElementById('lobby-error').textContent='';document.getElementById('lobby-status').textContent='';}
function generateCode(){var c='',chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';for(var i=0;i<6;i++)c+=chars.charAt(Math.floor(Math.random()*chars.length));return c;}
function createOnlineGame(){var name=getDisplayName()||'Player 1';var code=generateCode();gameId='c4_'+code;onlineRole='host';mySymbol=1;hostName=name;guestName='';_knownMoveCount=0;_lastSyncTime=0;_resetVersion=0;initBoard();fbPut('/connect4/'+gameId,{hostId:myId,guestId:null,hostName:name,guestName:'',resetVersion:0,board:board,turn:1,status:'waiting',moveCount:0}).then(function(){document.getElementById('room-code-value').textContent=code;document.getElementById('room-created').style.display='flex';document.getElementById('lobby-error').textContent='';document.getElementById('lobby-status').textContent='Waiting for opponent...';listenForOpponent();});}
function showJoinInput(){var row=document.getElementById('join-row');row.style.display=row.style.display==='none'?'flex':'none';if(row.style.display!=='none')document.getElementById('join-code-input').focus();}
function joinOnlineGame(){var code=document.getElementById('join-code-input').value.trim().toUpperCase();if(code.length<4){document.getElementById('lobby-error').textContent='Enter a valid code';return;}gameId='c4_'+code;_knownMoveCount=0;_lastSyncTime=0;fbGet('/connect4/'+gameId).then(function(data){if(!data){document.getElementById('lobby-error').textContent='Game not found';return;}if(data.guestId){document.getElementById('lobby-error').textContent='Game is full';return;}if(data.status!=='waiting'){document.getElementById('lobby-error').textContent='Game already started';return;}onlineRole='guest';mySymbol=2;var name=getDisplayName()||'Player 2';hostName=data.hostName||'Player 1';guestName=name;fbPatch('/connect4/'+gameId,{guestId:myId,guestName:name,status:'playing'}).then(function(){document.getElementById('lobby-error').textContent='';startOnlineGame();});});}
function listenForOpponent(){_knownMoveCount=0;_lastSyncTime=0;_pollTimer=setInterval(function(){fbGet('/connect4/'+gameId).then(function(data){if(!data||data.status==='abandoned'){document.getElementById('lobby-status').textContent='Host left the game';clearInterval(_pollTimer);return;}if(data.guestId&&data.status==='playing'){document.getElementById('lobby-status').textContent=(data.guestName||'Opponent')+' joined!';clearInterval(_pollTimer);setTimeout(function(){startOnlineGame();},500);}});},1000);}
function startOnlineGame(){mode='online';hostName=hostName||'Player 1';guestName=guestName||'Player 2';initBoard();turn=1;gameOver=false;_knownMoveCount=0;_resetVersion=0;_lastSyncTime=0;showScreen('screen-board');renderBoard();startOnlinePolling();}
function startOnlinePolling(){if(_pollTimer)clearInterval(_pollTimer);_pollTimer=setInterval(function(){var now=Date.now();if(now-_lastSyncTime<_syncDelay)return;fbGet('/connect4/'+gameId).then(function(data){if(!data||data.status==='abandoned'){document.getElementById('status-text').textContent='Opponent left the game';gameOver=true;if(_pollTimer){clearInterval(_pollTimer);_pollTimer=null;}return;}hostName=data.hostName||hostName||'Player 1';guestName=data.guestName||guestName||'Player 2';var rv=data.resetVersion||0;if(rv>_resetVersion){_resetVersion=rv;_knownMoveCount=0;_lastSyncTime=0;board=data.board||board;turn=1;gameOver=false;document.getElementById('win-overlay').classList.remove('active');renderBoard();return;}var mc=0;for(var c=0;c<COLS;c++)for(var r=0;r<ROWS;r++)if(board[c][r]!==0)mc++;if(data.moveCount<=mc)return;_knownMoveCount=data.moveCount;board=data.board||board;turn=data.turn||1;gameOver=data.gameOver||false;renderBoard();_lastSyncTime=Date.now();if(gameOver&&!document.getElementById('win-overlay').classList.contains('active')){var winResult=checkWin();if(winResult){highlightWin(winResult.win);document.getElementById('win-title').textContent=(winResult.p===mySymbol)?'🎉 You win!':'😞 You lose!';document.getElementById('win-desc').textContent='Connect 4!';document.getElementById('win-overlay').classList.add('active');}else if(isBoardFull()){document.getElementById('win-title').textContent='🤝 Draw!';document.getElementById('win-desc').textContent='The board is full.';document.getElementById('win-overlay').classList.add('active');}}});},800);}
function cleanupOnline(){if(_pollTimer){clearInterval(_pollTimer);_pollTimer=null;}if(gameId){fbPatch('/connect4/'+gameId,{status:'abandoned'}).then(function(){fbDelete('/connect4/'+gameId);});}}
function copyRoomCode(){var code=document.getElementById('room-code-value').textContent;navigator.clipboard.writeText(code).catch(function(){});}
window.addEventListener('beforeunload',function(){if(gameId){var xhr=new XMLHttpRequest();xhr.open('PATCH',DB_BASE+'/connect4/'+gameId+'.json?shallow=true',false);xhr.setRequestHeader('Content-Type','application/json');xhr.send(JSON.stringify({status:'abandoned'}));}});
function closeWin(){document.getElementById('win-overlay').classList.remove('active');resetGame();}
function submitLeaderboard(game,score){var name=localStorage.getItem('ttt_display_name')||'Anonymous';fetch(DB_BASE+'/leaderboard/'+game+'.json?auth='+DB_SECRET,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,score:score,submittedAt:Date.now()})}).catch(function(){});}
function loadLeaderboard(game,myScore){fetch(DB_BASE+'/leaderboard/'+game+'.json?auth='+DB_SECRET).then(function(r){return r.json();}).then(function(data){var entries=[];if(data){for(var key in data){var e=data[key];entries.push({name:e.name||'Anonymous',score:e.score||0});}entries.sort(function(a,b){return b.score-a.score;});}var html='';if(entries.length===0)html='<div class="lb-empty">No scores yet — be the first!</div>';else{html='<ol>';for(var i=0;i<entries.length;i++){var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';var cls=entries[i].score===myScore?' class="me"':'';html+='<li'+cls+'><span>'+medal+' '+entries[i].name+'</span> <span>'+entries[i].score+'</span></li>';}html+='</ol>';}document.getElementById('lb-content').innerHTML=html;}).catch(function(){document.getElementById('lb-content').innerHTML='<div class="lb-empty">Could not load leaderboard.</div>';});}
</script>
</body>
</html>
