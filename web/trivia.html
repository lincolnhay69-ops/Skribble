      --color-secondary: #2d5da1;
      --color-sticky: #fff9c4;
      --color-shadow: #2d2d2d;
      --color-correct: #4caf50;
      --color-wrong: #e53935;
      --font-heading: 'Kalam', cursive;
      --font-body: 'Patrick Hand', cursive;
    }
    body.dark {
      --color-background: #121212;
      --color-foreground: #ffffff;
      --color-muted: #2a2a2a;
      --color-border: #333;
      --color-shadow: transparent;
      background-image: radial-gradient(rgba(255,255,255,0.15) 1px, transparent 1px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-body);
      background: var(--color-background);
      background-image: radial-gradient(var(--color-muted) 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--color-foreground);
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 2px dashed var(--color-border);
      background: var(--color-background);
    }
    .header h1 {
      font-family: var(--font-heading);
      font-size: 1.4rem;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .window-btn {
      background: none;
      border: 2px solid var(--color-border);
      cursor: pointer;
      padding: 6px;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      color: var(--color-foreground);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
    }
    .window-btn:hover {
      background: var(--color-muted);
      box-shadow: 2px 2px 0 0 var(--color-shadow);
    }
    .back-btn {
      background: none;
      border: 2px solid var(--color-border);
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--color-foreground);
    }
    .back-btn:hover {
      background: var(--color-muted);
      box-shadow: 2px 2px 0 var(--color-shadow);
    }
    .screen {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .screen.active { display: flex; }
    .start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      max-width: 400px;
      width: 100%;
    }
    .start-screen h2 {
      font-family: var(--font-heading);
      font-size: 2rem;
      text-align: center;
    }
    .start-screen p { font-size: 1rem; opacity: 0.7; text-align: center; }
    .category-picker {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .cat-btn {
      border: 2px solid var(--color-border);
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      padding: 14px 20px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 1.1rem;
      color: var(--color-foreground);
      background: var(--color-sticky);
      transition: transform 0.1s, box-shadow 0.1s;
      text-align: center;
    }
    .cat-btn:hover {
      transform: scale(1.03);
      box-shadow: 3px 3px 0 var(--color-shadow);
    }
    .cat-btn.mixed { background: #c8e6c9; }
    .cat-btn.science { background: #bbdefb; }
    .cat-btn.history { background: #fff9c4; }
    .cat-btn.geography { background: #ffcc80; }
    .cat-btn.entertainment { background: #e1bee7; }

    .game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 500px;
      flex: 1;
      justify-content: center;
    }
    .progress-bar-wrap {
      width: 100%;
      height: 8px;
      background: var(--color-muted);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--color-secondary);
      transition: width 0.3s;
      border-radius: 4px;
    }
    .game-stats {
      display: flex;
      justify-content: space-between;
      width: 100%;
      font-family: var(--font-heading);
      font-size: 1rem;
    }
    .question-card {
      width: 100%;
      background: var(--color-background);
      border: 2px solid var(--color-border);
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      padding: 28px 24px;
      box-shadow: 4px 4px 0 var(--color-shadow);
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .question-text {
      font-family: var(--font-heading);
      font-size: 1.15rem;
      text-align: center;
      line-height: 1.5;
    }
    .answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .answer-btn {
      border: 2px solid var(--color-border);
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      padding: 14px 18px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--color-foreground);
      background: var(--color-sticky);
      transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
      text-align: left;
    }
    .answer-btn:hover:not(.disabled) {
      transform: scale(1.02);
      box-shadow: 2px 2px 0 var(--color-shadow);
    }
    .answer-btn.correct {
      background: var(--color-correct) !important;
      color: #fff;
    }
    .answer-btn.wrong {
      background: var(--color-wrong) !important;
      color: #fff;
    }
    .answer-btn.disabled { cursor: default; opacity: 0.7; }

    .timer-bar-wrap {
      width: 100%;
      height: 6px;
      background: var(--color-muted);
      border-radius: 3px;
      overflow: hidden;
    }
    .timer-bar-fill {
      height: 100%;
      background: var(--color-secondary);
      transition: width 1s linear;
      border-radius: 3px;
    }
    .timer-bar-fill.warning { background: #ff9800; }
    .timer-bar-fill.danger { background: var(--color-wrong); }

    .result-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .result-screen h2 {
      font-family: var(--font-heading);
      font-size: 2rem;
    }
    .result-screen .score-big {
      font-family: var(--font-heading);
      font-size: 3.5rem;
      line-height: 1;
    }
    .result-screen p.detail {
      font-size: 1.1rem;
      opacity: 0.8;
    }
    .result-screen .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .lb-wrap {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px dashed var(--color-border);
      max-height: 180px;
      overflow-y: auto;
      text-align: left;
      width: 100%;

    .lb-wrap h3 {
      font-family: var(--font-heading);
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 6px;
    }
    .lb-wrap ol {
      list-style: none;
      padding: 0;
      font-size: 0.8rem;
    }
    .lb-wrap li {
      display: flex;
      justify-content: space-between;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .lb-wrap li.me {
      background: rgba(0,0,0,0.06);
      font-weight: 700;
    }
    .lb-wrap .lb-empty {
      text-align: center;
      opacity: 0.5;
      font-size: 0.8rem;
      padding: 8px 0;
    }
    .primary-btn {
      background: var(--color-secondary);
      border: 2px solid var(--color-border);
      color: #fff;
      cursor: pointer;
      padding: 10px 28px;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      font-family: var(--font-body);
      font-size: 1rem;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .primary-btn:hover {
      transform: scale(1.05);
      box-shadow: 3px 3px 0 var(--color-shadow);
    }
    .secondary-btn {
      background: var(--color-muted);
      border: 2px solid var(--color-border);
      cursor: pointer;
      padding: 10px 28px;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--color-foreground);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .secondary-btn:hover {
      transform: scale(1.05);
      box-shadow: 3px 3px 0 var(--color-shadow);
    }
    @media (max-width: 480px) {
      .question-text { font-size: 1rem; }
      .answer-btn { padding: 12px 14px; font-size: 0.9rem; }
      .result-screen .score-big { font-size: 2.8rem; }
    }
  </style>
</head>

<div class="screen active" id="screen-start">

  </div>
</div>

<!-- Game Screen -->
<div class="screen" id="screen-game">
  <div class="game-area">
    <div class="game-stats">
      <span id="stat-progress">1 / 10</span>
      <span id="stat-score">✅ 0</span>

    </div>
    <div class="question-card">
      <div class="question-text" id="question-text">Loading...</div>
    </div>
    <div class="timer-bar-wrap">
      <div class="timer-bar-fill" id="timer-fill" style="width:100%"></div>
    </div>
    <div class="answers" id="answers"></div>
  </div>
</div>

<!-- Result Screen -->
<div class="screen" id="screen-result">
  <div class="result-screen">
    <h2 id="result-title">Results</h2>
    <div class="score-big" id="result-score">0</div>
    <p class="detail" id="result-detail">out of 10 correct</p>
    <p class="detail" id="result-pct"></p>
    <div class="lb-wrap">
      <h3>🏆 Leaderboard</h3>
      <div id="lb-content" class="lb-empty">Loading...</div>
    </div>
    <div class="btn-row">
      <button class="primary-btn" onclick="playAgain()">Play Again</button>
      <button class="secondary-btn" onclick="goHome()">Categories</button>
    </div>
  </div>
</div>

  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    timeLeft -= 0.1;
    if (timeLeft <= 0) {
      timeLeft = 0;
      answered = true;
      stopTimer();
      var q = currentQuestions[currentIndex];
      var btns = document.querySelectorAll('.answer-btn');
      btns.forEach(function(b) { b.classList.add('disabled'); });
      btns[q.correct].classList.add('correct');
      setTimeout(nextQuestion, 1200);
    }
    updateTimerBar();
  }, 100);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerBar() {
  var pct = (timeLeft / 15) * 100;
  var fill = document.getElementById('timer-fill');
  fill.style.width = pct + '%';
  fill.className = 'timer-bar-fill' + (timeLeft <= 5 ? ' danger' : timeLeft <= 10 ? ' warning' : '');
}

function nextQuestion() {
  currentIndex++;
  showQuestion();
}

function showResults() {
  stopTimer();
  showScreen('screen-result');
  document.getElementById('result-score').textContent = score + ' / ' + totalQuestions;
  document.getElementById('result-detail').textContent = score + ' out of ' + totalQuestions + ' correct';
  var pct = Math.round((score / totalQuestions) * 100);
  document.getElementById('result-pct').textContent = pct + '%';
  var title = '😢 Keep trying!';
  if (pct >= 100) title = '🏆 Perfect score!';
  else if (pct >= 80) title = '🌟 Excellent!';
  else if (pct >= 60) title = '👏 Good job!';
  else if (pct >= 40) title = '👍 Not bad!';
  document.getElementById('result-title').textContent = title;
  var finalScore = score * 100;
  submitLeaderboard('trivia', finalScore);
  loadLeaderboard('trivia', finalScore);
}

function playAgain() {
  startTrivia(selectedCategory);
}

function submitLeaderboard(game, score) {
  var name = localStorage.getItem('ttt_display_name') || 'Anonymous';
  fetch(DB_BASE + '/leaderboard/' + game + '.json?auth=' + DB_SECRET, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name, score: score, submittedAt: Date.now() })
  }).catch(function() {});
}

function loadLeaderboard(game, myScore) {
  fetch(DB_BASE + '/leaderboard/' + game + '.json?auth=' + DB_SECRET)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var entries = [];
      if (data) {
        for (var key in data) {
          var e = data[key];
          entries.push({ name: e.name || 'Anonymous', score: e.score || 0 });
        }
        entries.sort(function(a, b) { return b.score - a.score; });
      }
      var html = '';
      if (entries.length === 0) {
        html = '<div class="lb-empty">No scores yet — be the first!</div>';
      } else {
        html = '<ol>';
        for (var i = 0; i < entries.length; i++) {
          var medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1) + '.';
          var cls = entries[i].score === myScore ? ' class="me"' : '';
          html += '<li' + cls + '><span>' + medal + ' ' + entries[i].name + '</span> <span>' + entries[i].score + '</span></li>';
        }
        html += '</ol>';
      }
      document.getElementById('lb-content').innerHTML = html;
    })
    .catch(function() {
      document.getElementById('lb-content').innerHTML = '<div class="lb-empty">Could not load leaderboard.</div>';
    });
}
</script>
